<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SRM Syllabus Finder</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #fafafa;
        --surface: #ffffff;
        --text: #1a1a1a;
        --text-secondary: #6b7280;
        --border: #e5e7eb;
        --primary: #111827;
        --primary-hover: #374151;
        --user-bg: #111827;
        --user-fg: #ffffff;
        --bot-bg: #f3f4f6;
        --bot-fg: #1a1a1a;
        --accent: #3b82f6;
        --error-bg: #fef2f2;
        --error-border: #ef4444;
        --font: "Inter", system-ui, -apple-system, sans-serif;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0a0a0a;
          --surface: #111111;
          --text: #e5e5e5;
          --text-secondary: #9ca3af;
          --border: #1f1f1f;
          --primary: #e5e5e5;
          --primary-hover: #d4d4d4;
          --user-bg: #e5e5e5;
          --user-fg: #0a0a0a;
          --bot-bg: #1a1a1a;
          --bot-fg: #e5e5e5;
          --accent: #60a5fa;
          --error-bg: #1c0a0a;
          --error-border: #dc2626;
        }
      }

      body {
        font-family: var(--font);
        background: var(--bg);
        color: var(--text);
        height: 100dvh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        -webkit-font-smoothing: antialiased;
      }

      /* ── Header ──────────────────────────────────────────────── */
      header {
        padding: 16px 24px;
        border-bottom: 1px solid var(--border);
        background: var(--surface);
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      header h1 {
        font-size: 0.95rem;
        font-weight: 600;
        letter-spacing: -0.01em;
      }
      header .meta {
        font-size: 0.75rem;
        color: var(--text-secondary);
      }

      /* ── Chat ────────────────────────────────────────────────── */
      #chat {
        flex: 1;
        overflow-y: auto;
        padding: 24px 16px;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }
      #chat::-webkit-scrollbar {
        width: 0;
      }

      /* ── Messages ────────────────────────────────────────────── */
      .msg {
        display: flex;
        gap: 0;
        max-width: 100%;
        animation: fadeUp 0.15s ease-out;
      }
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(4px);
        }
        to {
          opacity: 1;
        }
      }
      .msg.user {
        justify-content: flex-end;
      }

      .bubble {
        padding: 10px 16px;
        border-radius: 18px;
        max-width: min(680px, 85%);
        line-height: 1.6;
        font-size: 0.9rem;
        word-break: break-word;
      }
      .msg.user .bubble {
        background: var(--user-bg);
        color: var(--user-fg);
        border-bottom-right-radius: 4px;
      }
      .msg.bot .bubble {
        background: var(--bot-bg);
        color: var(--bot-fg);
        border-bottom-left-radius: 4px;
      }

      /* ── Markdown inside bot bubbles ─────────────────────────── */
      .bubble .content h2 {
        font-size: 1rem;
        font-weight: 600;
        margin-bottom: 8px;
        padding-bottom: 6px;
        border-bottom: 1px solid var(--border);
      }
      .bubble .content h3 {
        font-size: 0.85rem;
        font-weight: 600;
        color: var(--accent);
        margin: 12px 0 4px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .bubble .content p {
        margin: 4px 0;
      }
      .bubble .content ul,
      .bubble .content ol {
        padding-left: 18px;
        margin: 4px 0;
      }
      .bubble .content li {
        margin: 2px 0;
        font-size: 0.88rem;
      }
      .bubble .content strong {
        font-weight: 600;
      }
      .bubble .content code {
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 1px 5px;
        font-size: 0.82em;
        font-family: "SF Mono", "Fira Code", monospace;
      }

      /* PDF Download Button */
      .pdf-btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        margin-top: 12px;
        padding: 6px 12px;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 8px;
        font-size: 0.8rem;
        font-weight: 500;
        color: var(--text);
        cursor: pointer;
        transition: all 0.15s;
        font-family: var(--font);
      }
      .pdf-btn:hover {
        background: var(--border);
      }
      .pdf-btn svg {
        width: 14px;
        height: 14px;
      }

      /* ── Error ───────────────────────────────────────────────── */
      .error-bubble {
        background: var(--error-bg) !important;
        border-left: 2px solid var(--error-border);
      }

      /* ── Input ───────────────────────────────────────────────── */
      #inputbar {
        padding: 12px 16px 16px;
        background: var(--surface);
        border-top: 1px solid var(--border);
        flex-shrink: 0;
      }
      #inputwrap {
        display: flex;
        gap: 8px;
        position: relative;
        max-width: 720px;
        margin: 0 auto;
      }
      #q {
        flex: 1;
        padding: 10px 16px;
        border: 1px solid var(--border);
        border-radius: 12px;
        font-size: 0.9rem;
        font-family: var(--font);
        outline: none;
        background: var(--bg);
        color: var(--text);
        transition: border-color 0.15s;
      }
      #q::placeholder {
        color: var(--text-secondary);
      }
      #q:focus {
        border-color: var(--accent);
      }

      #sendbtn {
        padding: 10px 18px;
        background: var(--primary);
        color: var(--bg);
        border: none;
        border-radius: 12px;
        font-size: 0.85rem;
        font-weight: 500;
        font-family: var(--font);
        cursor: pointer;
        transition: background 0.15s;
        flex-shrink: 0;
      }
      #sendbtn:hover {
        background: var(--primary-hover);
      }
      #sendbtn:disabled {
        opacity: 0.4;
        cursor: default;
      }

      /* ── Suggestions dropdown ─────────────────────────────────── */
      #suggestions {
        position: absolute;
        bottom: calc(100% + 4px);
        left: 0;
        right: 80px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        max-height: 200px;
        overflow-y: auto;
        z-index: 100;
        display: none;
      }
      .sug-item {
        padding: 8px 14px;
        cursor: pointer;
        display: flex;
        gap: 10px;
        align-items: baseline;
        font-size: 0.85rem;
        transition: background 0.1s;
      }
      .sug-item:first-child {
        border-radius: 10px 10px 0 0;
      }
      .sug-item:last-child {
        border-radius: 0 0 10px 10px;
      }
      .sug-item:hover,
      .sug-item.active {
        background: var(--bot-bg);
      }
      .sug-code {
        font-weight: 600;
        font-family: "SF Mono", "Fira Code", monospace;
        font-size: 0.8rem;
        color: var(--accent);
        flex-shrink: 0;
      }
      .sug-name {
        color: var(--text-secondary);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      /* ── Typing dots ─────────────────────────────────────────── */
      .dot-flashing {
        display: inline-flex;
        gap: 4px;
        padding: 4px 0;
      }
      .dot-flashing span {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--text-secondary);
        animation: blink 1.4s infinite both;
      }
      .dot-flashing span:nth-child(2) {
        animation-delay: 0.2s;
      }
      .dot-flashing span:nth-child(3) {
        animation-delay: 0.4s;
      }
      @keyframes blink {
        0%,
        80%,
        100% {
          opacity: 0.2;
        }
        40% {
          opacity: 1;
        }
      }

      /* ── Welcome state ───────────────────────────────────────── */
      .welcome {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        flex: 1;
        gap: 8px;
        color: var(--text-secondary);
        text-align: center;
        padding: 40px 20px;
      }
      .welcome h2 {
        font-size: 1.1rem;
        font-weight: 600;
        color: var(--text);
      }
      .welcome p {
        font-size: 0.85rem;
        max-width: 360px;
        line-height: 1.5;
      }

      /* ── Responsive ──────────────────────────────────────────── */
      @media (max-width: 480px) {
        header {
          padding: 12px 16px;
        }
        #chat {
          padding: 16px 10px;
        }
        .bubble {
          max-width: 92%;
          padding: 8px 12px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>SRM Syllabus Finder</h1>
      <span class="meta" id="stats-badge"></span>
    </header>

    <div id="chat"></div>

    <div id="inputbar">
      <div id="inputwrap">
        <div id="suggestions"></div>
        <input
          id="q"
          type="text"
          placeholder="Ask about any course or topic..."
          autocomplete="off"
          spellcheck="false"
        />
        <button id="sendbtn" onclick="handleSend()">Send</button>
      </div>
    </div>

    <script>
      marked.setOptions({ breaks: true, gfm: true });

      const chat = document.getElementById("chat");
      const input = document.getElementById("q");
      const sendBtn = document.getElementById("sendbtn");
      const sugBox = document.getElementById("suggestions");

      let sugIndex = -1,
        sugItems = [],
        sugTimer = null;
      let lastQueryContext = "Syllabus";

      /* ── Init ─────────────────────────────────────────────── */
      window.addEventListener("DOMContentLoaded", () => {
        chat.innerHTML = `
          <div class="welcome">
            <h2>Ask anything about your syllabus</h2>
            <p>Search by course code, ask about prerequisites, compare courses, or explore topics.</p>
          </div>`;
        loadStats();
        input.focus();
      });

      async function loadStats() {
        try {
          const r = await fetch("/api/stats");
          if (!r.ok) return;
          const d = await r.json();
          document.getElementById("stats-badge").textContent =
            d.total_courses + " courses";
        } catch {}
      }

      function isDirectSearch(q) {
        return /^\s*21[A-Z]{2,5}\d{3}[A-Z]?\s*$/i.test(q);
      }

      function clearWelcome() {
        const w = chat.querySelector(".welcome");
        if (w) w.remove();
      }

      /* ── Send ──────────────────────────────────────────────── */
      async function handleSend() {
        const q = input.value.trim();
        if (!q) return;
        sendQuery(q);
      }

      async function sendQuery(q) {
        lastQueryContext = q;
        input.value = "";
        hideSuggestions();
        clearWelcome();
        appendUserMsg(q);
        sendBtn.disabled = true;

        const isSyllabus = isDirectSearch(q);

        // Try /api/search first for both code lookups and name searches
        {
          const tid = appendTyping();
          try {
            const r = await fetch("/api/search?q=" + encodeURIComponent(q));
            const data = r.ok ? await r.json() : null;

            if (data && data.type === "course") {
              // Single course match — show with PDF button
              removeEl(tid);
              appendBotMsg(data.response, false, true, true);
              sendBtn.disabled = false;
              input.focus();
              return;
            }
            if (data && data.type === "list") {
              // Multiple matches — show the list, no PDF button
              removeEl(tid);
              appendBotMsg(data.response, false, true, false);
              sendBtn.disabled = false;
              input.focus();
              return;
            }
            // not_found or error — for direct code searches, show the result;
            // for name queries, fall through to AI chat
            removeEl(tid);
            if (isSyllabus) {
              appendBotMsg(
                data ? data.response || "_No results._" : "**Error:** Unknown",
                !r.ok,
                true,
                false,
              );
              sendBtn.disabled = false;
              input.focus();
              return;
            }
          } catch {
            removeEl(tid);
            if (isSyllabus) {
              appendBotMsg(
                "**Cannot reach server.** Is the backend running?",
                true,
              );
              sendBtn.disabled = false;
              input.focus();
              return;
            }
          }
        }

        const botId = appendBotMsgEmpty();
        let full = "";
        try {
          const res = await fetch("/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ question: q }),
          });
          if (!res.ok) {
            const err = await res.json();
            updateBotMsg(
              botId,
              "**Error:** " + (err.detail || "Unknown"),
              true,
            );
            sendBtn.disabled = false;
            input.focus();
            return;
          }
          const reader = res.body.getReader();
          const dec = new TextDecoder();
          let buf = "";
          while (true) {
            const { done, value } = await reader.read();
            if (done) {
              const textIndicatesSyllabus =
                full.includes("L-T-P-C") || full.includes("Course Outcomes");
              updateBotMsg(botId, full, false, true, textIndicatesSyllabus);
              break;
            }
            buf += dec.decode(value, { stream: true });
            const lines = buf.split("\n");
            buf = lines.pop();
            for (const line of lines) {
              if (!line.startsWith("data: ")) continue;
              const payload = line.slice(6).trim();
              if (payload === "[DONE]") continue;
              try {
                const d = JSON.parse(payload);
                if (d.error) {
                  updateBotMsg(botId, "**Error:** " + d.error, true);
                  sendBtn.disabled = false;
                  input.focus();
                  return;
                }
                if (d.text) {
                  full += d.text;
                  updateBotMsg(botId, full);
                }
              } catch {}
            }
          }
          if (!full)
            updateBotMsg(botId, "No response generated. Try rephrasing.", true);
        } catch {
          updateBotMsg(
            botId,
            "**Cannot reach server.** Is the backend running?",
            true,
          );
        } finally {
          sendBtn.disabled = false;
          input.focus();
        }
      }

      /* ── Message helpers ────────────────────────────────────── */
      let mid = 0;

      function appendUserMsg(text) {
        const id = ++mid;
        chat.insertAdjacentHTML(
          "beforeend",
          `<div class="msg user" id="m${id}"><div class="bubble">${esc(text)}</div></div>`,
        );
        scroll();
        return id;
      }

      function appendBotMsg(md, err = false, done = false, showPdf = false) {
        const id = ++mid;
        let html = `<div class="content">${marked.parse(md)}</div>`;
        if (done && !err && showPdf) {
          html += getPdfButtonHtml(id);
        }
        chat.insertAdjacentHTML(
          "beforeend",
          `<div class="msg bot" id="m${id}" data-query="${esc(lastQueryContext)}"><div class="bubble${err ? " error-bubble" : ""}">${html}</div></div>`,
        );
        scroll();
        return id;
      }

      function appendBotMsgEmpty() {
        const id = ++mid;
        chat.insertAdjacentHTML(
          "beforeend",
          `<div class="msg bot" id="m${id}" data-query="${esc(lastQueryContext)}"><div class="bubble"><div class="dot-flashing"><span></span><span></span><span></span></div></div></div>`,
        );
        scroll();
        return id;
      }

      function updateBotMsg(
        id,
        md,
        err = false,
        done = false,
        showPdf = false,
      ) {
        const el = document.getElementById("m" + id);
        if (!el) return;
        const b = el.querySelector(".bubble");
        b.className = "bubble" + (err ? " error-bubble" : "");
        let html = `<div class="content">${marked.parse(md)}</div>`;
        if (done && !err && showPdf) {
          html += getPdfButtonHtml(id);
        }
        b.innerHTML = html;
        scroll();
      }

      function getPdfButtonHtml(msgId) {
        return `
          <button class="pdf-btn" onclick="downloadPDF('m${msgId}')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
              <polyline points="7 10 12 15 17 10"></polyline>
              <line x1="12" y1="15" x2="12" y2="3"></line>
            </svg>
            Download PDF
          </button>
        `;
      }

      async function downloadPDF(id) {
        const el = document.getElementById(id);
        if (!el) return;

        const btn = el.querySelector(".pdf-btn");
        if (btn)
          btn.innerHTML =
            '<span class="dot-flashing" style="margin-right:8px;padding:0"><span></span><span></span><span></span></span> Generating...';

        try {
          // Use the query stored on this specific message, not the global
          const msgQuery = el.getAttribute("data-query") || "";
          let codeToFetch = "";
          if (isDirectSearch(msgQuery)) {
            codeToFetch = msgQuery.trim();
          } else {
            const codeMatch = el
              .querySelector(".content")
              .textContent.match(/\b21[A-Z]{2,5}\d{3}[A-Z]?\b/i);
            if (codeMatch) codeToFetch = codeMatch[0];
          }

          if (!codeToFetch) {
            alert(
              "Could not identify a clear course code to download its PDF.",
            );
            return;
          }

          // Fetch the PDF as a blob so we control the filename
          const response = await fetch(
            `/api/pdf/${encodeURIComponent(codeToFetch)}`,
          );
          if (!response.ok) {
            const err = await response.json().catch(() => ({}));
            alert("Download failed: " + (err.detail || response.statusText));
            return;
          }

          const blob = await response.blob();
          const objectUrl = URL.createObjectURL(blob);

          const a = document.createElement("a");
          a.href = objectUrl;
          a.download = `${codeToFetch.toUpperCase()}_Syllabus.pdf`;
          a.style.display = "none";
          document.body.appendChild(a);
          a.click();
          setTimeout(() => {
            document.body.removeChild(a);
            URL.revokeObjectURL(objectUrl);
          }, 1000);
        } catch (err) {
          console.error("PDF Download Failed", err);
          alert("Failed to download PDF.");
        } finally {
          if (btn)
            btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg> Download PDF`;
        }
      }

      function appendTyping() {
        const id = ++mid;
        chat.insertAdjacentHTML(
          "beforeend",
          `<div class="msg bot" id="m${id}"><div class="bubble"><div class="dot-flashing"><span></span><span></span><span></span></div></div></div>`,
        );
        scroll();
        return id;
      }

      function removeEl(id) {
        document.getElementById("m" + id)?.remove();
      }
      function scroll() {
        chat.scrollTop = chat.scrollHeight;
      }
      function esc(s) {
        return s
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      /* ── Keyboard ───────────────────────────────────────────── */
      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          sugIndex >= 0 && sugItems[sugIndex]
            ? selectSug(sugIndex)
            : handleSend();
          return;
        }
        if (e.key === "ArrowDown") {
          e.preventDefault();
          moveSug(1);
        }
        if (e.key === "ArrowUp") {
          e.preventDefault();
          moveSug(-1);
        }
        if (e.key === "Escape") hideSuggestions();
      });

      input.addEventListener("input", () => {
        clearTimeout(sugTimer);
        sugTimer = setTimeout(fetchSuggestions, 200);
      });

      /* ── Autocomplete ───────────────────────────────────────── */
      async function fetchSuggestions() {
        const q = input.value.trim();
        if (q.length < 2) {
          hideSuggestions();
          return;
        }
        try {
          const r = await fetch("/api/suggest?q=" + encodeURIComponent(q));
          const d = await r.json();
          sugItems = d.suggestions || [];
          renderSuggestions();
        } catch {}
      }

      function renderSuggestions() {
        if (!sugItems.length) {
          hideSuggestions();
          return;
        }
        sugIndex = -1;
        sugBox.innerHTML = sugItems
          .map(
            (s, i) =>
              `<div class="sug-item" onclick="selectSug(${i})">
            <span class="sug-code">${esc(s.code)}</span>
            <span class="sug-name">${esc(s.name)}</span>
          </div>`,
          )
          .join("");
        sugBox.style.display = "block";
      }

      function hideSuggestions() {
        sugBox.style.display = "none";
        sugIndex = -1;
      }

      function moveSug(dir) {
        const items = sugBox.querySelectorAll(".sug-item");
        if (!items.length) return;
        items[sugIndex]?.classList.remove("active");
        sugIndex = Math.max(-1, Math.min(items.length - 1, sugIndex + dir));
        if (sugIndex >= 0) {
          items[sugIndex].classList.add("active");
          items[sugIndex].scrollIntoView({ block: "nearest" });
          input.value = sugItems[sugIndex].code;
        }
      }

      function selectSug(i) {
        if (!sugItems[i]) return;
        hideSuggestions();
        sendQuery(sugItems[i].code);
      }

      document.addEventListener("click", (e) => {
        if (!e.target.closest("#inputwrap")) hideSuggestions();
      });
    </script>
  </body>
</html>
